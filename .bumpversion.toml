# Maintainer-only: sync STANDARDS_VERSION, example @v pins, and docs with bump-my-version.
# Run via scripts/standards_release_bump.sh (then finalize_changelog). Do not list CHANGELOG.md here.

[tool.bumpversion]
current_version = "4.3.2"
commit = false
tag = false
allow_dirty = false
parse = "(?P<major>\\d+)\\.(?P<minor>\\d+)\\.(?P<patch>\\d+)"
serialize = ["{major}.{minor}.{patch}"]
regex = false

[[tool.bumpversion.files]]
filename = "STANDARDS_VERSION"

[[tool.bumpversion.files]]
filename = "README.md"
search = "@v{current_version}"
replace = "@v{new_version}"

[[tool.bumpversion.files]]
filename = "README.md"
search = "v{current_version}"
replace = "v{new_version}"

[[tool.bumpversion.files]]
filename = "docs/migration-guide.md"
search = "@v{current_version}"
replace = "@v{new_version}"

[[tool.bumpversion.files]]
filename = "docs/migration-guide.md"
search = "{current_version}"
replace = "{new_version}"

[[tool.bumpversion.files]]
filename = "docs/reusable-workflows.md"
search = "@v{current_version}"
replace = "@v{new_version}"

[[tool.bumpversion.files]]
filename = "docs/versioning.md"
search = "v{current_version}"
replace = "v{new_version}"

[[tool.bumpversion.files]]
filename = "templates/github-workflows/lint.yml"
search = "@v{current_version}"
replace = "@v{new_version}"

[[tool.bumpversion.files]]
filename = ".github/instructions/github-actions.instructions.md"
search = "@v{current_version}"
replace = "@v{new_version}"
