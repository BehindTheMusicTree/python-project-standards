name: Reusable Lint

on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: ubuntu-latest
      python-version:
        required: false
        type: string
        default: "3.12"
      pre-install-command:
        required: false
        type: string
        default: ""
      install-command:
        required: false
        type: string
        default: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      pre-commit-command:
        required: false
        type: string
        default: pre-commit run --all-files

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Pre-install step
        if: inputs.pre-install-command != ''
        run: ${{ inputs.pre-install-command }}

      - name: Install dependencies
        run: ${{ inputs.install-command }}

      - name: Run pre-commit
        run: ${{ inputs.pre-commit-command }}
